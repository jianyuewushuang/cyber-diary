<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博日记本</title>
  <style>
    :root {
      --primary-color: #9b59b6;
      --primary-transparent: rgba(155, 89, 182, 0.3);
      --primary-light: rgba(155, 89, 182, 0.1);
      --secondary-color: #8e44ad;
      --accent-color: #bb6bd9;
      --bg-color: #0a0a0f;
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-color: #e0e0e0;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, var(--primary-transparent) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border-color);
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .header-search {
      width: 300px;
    }

    .header-search .search-input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
    }

    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
    }

    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-color);
      border-radius: 0;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .tab-btn:hover {
      border-color: var(--primary-color);
      background: var(--primary-light);
    }

    .tab-btn.active {
      background: var(--primary-color);
      border-color: var(--primary-color);
      color: white;
    }

    .tab-content {
      display: none;
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 1rem 1rem;
    }

    .tab-content.active {
      display: block;
    }

    .calendar-layout {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .calendar-container {
      background: var(--card-bg);
      border-radius: 0;
      padding: 1rem;
      border: 1px solid var(--border-color);
      flex: 1;
      min-width: 0;
    }

    .diary-detail {
      background: var(--card-bg);
      border-radius: 0;
      border: 1px solid var(--border-color);
      width: 500px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 200px);
    }

    .diary-detail-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .diary-detail-header h2 {
      font-size: 1.1rem;
      color: var(--primary-color);
      margin: 0;
    }

    .diary-detail-body {
      padding: 1rem;
      overflow-y: auto;
      flex: 1;
      line-height: 1.6;
    }

    .diary-detail-body h1, .diary-detail-body h2, .diary-detail-body h3 {
      color: var(--primary-color);
      margin: 1.5rem 0 0.75rem;
    }

    .diary-detail-body h1:first-child {
      margin-top: 0;
    }

    .diary-detail-body ul, .diary-detail-body ol {
      padding-left: 1.5rem;
      margin: 0.75rem 0;
    }

    .diary-detail-body blockquote {
      border-left: 3px solid var(--primary-color);
      padding-left: 1rem;
      margin: 1rem 0;
      color: #888;
      font-style: italic;
    }

    .diary-detail-body code {
      background: rgba(155, 89, 182, 0.2);
      padding: 0.2rem 0.4rem;
      border-radius: 0;
      font-family: 'Courier New', monospace;
    }

    .diary-detail-body pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 1.5rem;
      border-radius: 0;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .diary-detail-body pre code {
      background: none;
      padding: 0;
    }

    .diary-detail-body img {
      max-width: 100%;
      border-radius: 0;
    }

    .diary-detail-body a {
      color: var(--accent-color);
      text-decoration: none;
    }

    .diary-detail-body a:hover {
      text-decoration: underline;
    }

    .detail-date {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
    }

    .detail-words {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .detail-content {
      color: #ccc;
    }

    .detail-content h1, .detail-content h2, .detail-content h3 {
      color: var(--primary-color);
      margin: 1.5rem 0 0.75rem;
    }

    .detail-content h1:first-child {
      margin-top: 0;
    }

    .detail-content ul, .detail-content ol {
      padding-left: 1.5rem;
      margin: 0.75rem 0;
    }

    .detail-content blockquote {
      border-left: 3px solid var(--primary-color);
      padding-left: 1rem;
      margin: 1rem 0;
      color: #888;
      font-style: italic;
    }

    .detail-content code {
      background: rgba(155, 89, 182, 0.2);
      padding: 0.2rem 0.4rem;
      border-radius: 0;
      font-family: 'Courier New', monospace;
    }

    .detail-content pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 1.5rem;
      border-radius: 0;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .detail-content pre code {
      background: none;
      padding: 0;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .calendar-nav {
      display: flex;
      gap: 1rem;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-color);
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    .nav-btn:hover {
      border-color: var(--primary-color);
      background: var(--primary-light);
    }

    .month-year {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .year-selector {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .year-select-input, .month-select-input {
      padding: 0.5rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 0;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
    }

    .year-select-input:focus, .month-select-input:focus {
      border-color: var(--primary-color);
    }

    .year-select-input option, .month-select-input option {
      background: var(--bg-color);
      color: var(--text-color);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
    }

    .day-name {
      text-align: center;
      padding: 1rem;
      color: #888;
      font-weight: bold;
      font-size: 0.85rem;
    }

    .day-cell {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      border-radius: 0;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      font-size: 0.9rem;
      padding: 8px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
    }

    .day-number {
      font-weight: bold;
      color: var(--text-color);
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .day-cell.has-diary .day-number {
      color: var(--primary-color);
    }

    .day-preview {
      font-size: 0.6rem;
      color: #888;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      margin-bottom: 4px;
    }

    .day-wordcount {
      font-size: 0.65rem;
      color: var(--primary-color);
      opacity: 0.8;
    }

    .day-cell:hover {
      background: var(--primary-light);
    }

    .day-cell.other-month {
      color: #444;
    }

    .day-cell.has-diary {
      color: var(--primary-color);
      font-weight: bold;
    }

    .day-cell.has-diary::after {
      content: '';
      position: absolute;
      bottom: 8px;
      width: var(--circle-size, 8px);
      height: var(--circle-size, 8px);
      border-radius: 0;
      background: var(--primary-color);
      opacity: 0.8;
    }

    .day-cell.selected {
      background: var(--primary-color);
      color: white;
    }

    .day-cell.selected::after {
      background: white;
    }

    .diary-preview {
      margin-top: 2rem;
      background: var(--card-bg);
      border-radius: 0;
      padding: 2rem;
      border: 1px solid var(--border-color);
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .preview-date {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary-color);
    }

    .preview-words {
      font-size: 0.9rem;
      color: #888;
    }

    .preview-content {
      margin-top: 1rem;
      line-height: 1.6;
      color: #ccc;
    }

    .preview-content h1, .preview-content h2, .preview-content h3 {
      color: var(--primary-color);
      margin: 1rem 0 0.5rem;
    }

    .preview-content ul, .preview-content ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }

    .preview-content blockquote {
      border-left: 3px solid var(--primary-color);
      padding-left: 1rem;
      margin: 1rem 0;
      color: #888;
    }

    .preview-content code {
      background: rgba(155, 89, 182, 0.2);
      padding: 0.2rem 0.4rem;
      border-radius: 0;
      font-family: 'Courier New', monospace;
    }

    .preview-content pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 1rem;
      border-radius: 0;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .preview-content pre code {
      background: none;
      padding: 0;
    }

    .read-more {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: var(--primary-color);
      color: white;
      border-radius: 0;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .read-more:hover {
      background: var(--secondary-color);
    }

    .search-container {
      margin-bottom: 2rem;
    }

    .search-input {
      width: 100%;
      padding: 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0;
      color: var(--text-color);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 20px var(--primary-transparent);
    }

    .search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .search-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .search-card:hover {
      border-color: var(--primary-color);
      transform: translateY(-2px);
    }

    .search-date {
      color: var(--primary-color);
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .search-preview {
      color: #888;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: #888;
      font-size: 0.9rem;
    }

    .chart-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .chart-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: var(--primary-color);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 0;
      max-width: 800px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--primary-color);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      color: var(--text-color);
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      background: var(--primary-light);
    }

    .modal-body {
      padding: 2rem;
      line-height: 1.8;
    }

    .modal-body h1, .modal-body h2, .modal-body h3 {
      color: var(--primary-color);
      margin: 1.5rem 0 0.75rem;
    }

    .modal-body h1:first-child {
      margin-top: 0;
    }

    .modal-body ul, .modal-body ol {
      padding-left: 1.5rem;
      margin: 0.75rem 0;
    }

    .modal-body blockquote {
      border-left: 3px solid var(--primary-color);
      padding-left: 1rem;
      margin: 1rem 0;
      color: #888;
      font-style: italic;
    }

    .modal-body code {
      background: rgba(155, 89, 182, 0.2);
      padding: 0.2rem 0.4rem;
      border-radius: 0;
      font-family: 'Courier New', monospace;
    }

    .modal-body pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 1.5rem;
      border-radius: 0;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .modal-body pre code {
      background: none;
      padding: 0;
    }

    .modal-body img {
      max-width: 100%;
      border-radius: 0;
    }

    .modal-body a {
      color: var(--accent-color);
      text-decoration: none;
    }

    .modal-body a:hover {
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      padding: 4rem;
      color: #666;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .calendar-grid {
        gap: 0.25rem;
      }

      .day-cell {
        font-size: 0.8rem;
      }

      .stats-container {
        grid-template-columns: repeat(2, 1fr);
      }

      .calendar-layout {
        flex-direction: column;
      }

      .diary-detail {
        width: 100%;
        max-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1>赛博日记本</h1>
        <p class="subtitle">Cyber Diary - 你的数字记忆</p>
      </div>
      <div class="header-search">
        <input type="text" class="search-input" id="search-input" placeholder="搜索日记...">
      </div>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="tab-btn active" data-tab="calendar">日历视图</button>
    <button class="tab-btn" data-tab="search">搜索日记</button>
    <button class="tab-btn" data-tab="stats">统计数据</button>
  </div>

  <div id="calendar-tab" class="tab-content active">
    <div class="calendar-layout">
      <div class="calendar-container">
        <div class="calendar-header">
        <button class="nav-btn" id="prev-month">&lt;</button>
        <div class="month-year" id="current-month"></div>
        <button class="nav-btn" id="next-month">&gt;</button>
      </div>
      <div class="year-selector" id="year-selector">
        <select id="year-select" class="year-select-input">
        </select>
        <select id="month-select" class="month-select-input">
        </select>
      </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
      <div class="diary-detail" id="diary-detail">
        <div class="diary-detail-header">
          <h2>日记详情</h2>
        </div>
        <div class="diary-detail-body" id="diary-detail-body">
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>点击日历上的日期查看日记全文</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="search-tab" class="tab-content">
    <div class="search-container">
      <input type="text" class="search-input" id="search-input" placeholder="搜索日记内容...">
    </div>
    <div class="search-results" id="search-results"></div>
  </div>

  <div id="stats-tab" class="tab-content">
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="total-count">0</div>
        <div class="stat-label">日记总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-words">0</div>
        <div class="stat-label">总字数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="active-days">0</div>
        <div class="stat-label">活跃天数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avg-words">0</div>
        <div class="stat-label">平均字数</div>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-title">月度日记统计</div>
      <canvas id="monthly-chart"></canvas>
    </div>
    <div class="chart-container">
      <div class="chart-title">周度日记统计</div>
      <canvas id="weekly-chart"></canvas>
    </div>
    <div class="chart-container">
      <div class="chart-title">年度日记统计</div>
      <canvas id="yearly-chart"></canvas>
    </div>
    <div class="chart-container">
      <div class="chart-title">每日字数分布</div>
      <canvas id="daily-chart"></canvas>
    </div>
  </div>

  <div class="modal-overlay" id="diary-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const diaries = [{"filename":"20260606.md","dateStr":"2026-06-06","year":2026,"month":6,"day":6,"content":"# 心情大好\r\n\r\nToday is an epic day!\r\n\r\n今天是跑9KM的日子，虽然这个活动在我心中并不重要，但为了今天的比赛我做了很长时间的准备，每天晚上跑一个9KM，还是希望看到自己努力的成果的。\r\n\r\n没想到的是今天下雨了，考虑了一下还是决定参加了。\r\n\r\n到跑场之后遇到了很多我们班的同学。\r\n\r\n我本来打算把号码牌装到兜子里，可是现场却说要把号码牌挂到胸前，事实证明这是一个正确的抉择，因为后来搜照片需要用号码牌搜。\r\n\r\n为了装手机，我买了一个跑步腰包，昨天下午刚好回来，也是很极限了。今天我把号码牌别到了腰包上，它发挥了很大的作用。\r\n\r\n[现场氛围在主持人的带动下很燃](../resources\\260606\\IMG_20260606_084819.jpg)，但我不是很理解为什么跑9KM还要热身？\r\n\r\n这个比赛规模还是可以的，活动也有模有样的。\r\n\r\n[大球球](../resources\\260606\\mmexport1780732012207.jpg)\r\n\r\n没想到副校长也到场了。\r\n\r\n本来打算穿着冲锋衣跑，可是到那边之后感觉温度还可以，大家也都只穿着半袖，于是我也便把冲锋衣脱了，存包的地方人太多了，我就把包随手放到了一边，没想到之后包竟然湿了，看来这个包的防水性能也不是太强。之后还得注意。\r\n\r\n[发枪前](../resources\\260606\\IMG_20260606_085349.jpg)\r\n\r\n起跑之后大家都冲得很猛。开跑之后还遇到了李广昱，和他打了个招呼，然后就把他超了。我依旧选择了跟人的策略。一开始跟着一位4分30左右的看起来很专业的大姐，但跑了一会儿感觉有点慢了，于是我就发挥我越野跑优势，用人行道过弯把她超了。然后又跟了一位看起来也很专业的双马尾小姐姐，她身上香香的😋。\r\n\r\n这时正是雨下的最大的时候，我连眼睛都睁不开，戴的眼镜完全起不到任何作用，这时我的鞋也湿透了，开始的时候还刻意躲一躲水坑，但后来反正鞋也湿透了，干脆也不管了，有水坑也直接往过踩。\r\n\r\n又跑了一会儿之后我觉得这位小姐姐也有点慢了，于是我又[跟上了一位大叔](../resources\\260606\\mmexport6f1bc9c8ce3412f4307c6144265ae9aa_1780716766313.jpg)，大概4分10秒左右，等到还剩大约一千多米的时候我再次发挥越野跑优势把他超了，之后继续以这个速度一直跑到终点。\r\n\r\n[跑步照片1](../resources\\260606\\mmexporte8ff59c8cbfca7079ed808a7df31ad1b_1780716780062.jpg) [跑步照片2](../resources\\260606\\mmexport13d6c12065b0c5d3a9dbfc8ee790f6d0_1780716759037.jpg)\r\n\r\n跑完之后其实不是很累，发了一个北京一号的奖牌和一瓶水，一盒饼干。奖牌上可以刻字，但人太多了，我没排队，直接回宿舍了。\r\n\r\n没想到的是室友竟然还都没起。\r\n\r\n回到宿舍之后朋友圈逐渐活跃了起来。不出意外我跑的最快。在找我的照片的时候偶然看到了尚彦睿的照片，就顺手给他发过去了。还和他聊了几句，我还[约了他跑步](../resources\\260606\\Screenshot_2026_0606_154711.jpg)。\r\n\r\n之后各个平台的成绩就都出来了，名次凑合吧，其实比我想象的低一些，但配速却远超我的想象。果然还是大家一起跑更有动力啊。\r\n\r\n[1](../resources\\260606\\927d4cc5.jpg) [2](../resources\\260606\\calendar_share_20260606_095825.png) [3](../resources\\260606\\mmexport1780716681857.png) [4](../resources\\260606\\Screenshot_2026_0606_113135.jpg) [5](../resources\\260606\\Screenshot_20260606_095108.jpg) [6](../resources\\260606\\Screenshot_20260606_161317.jpg)\r\n\r\n这次的跑步活动算是圆满结束了，还是非常开心的，以后还是多参加这种有意义的活动比较好。\r\n\r\n下午的时候洗了个澡，感觉有点疲乏，来图书馆写日记了。\r\n\r\n张文耀又约我打乒乓球了，他可真是乐此不疲啊。\r\n\r\n现在天气终于放晴了。\r\n\r\n明天或后天还是得抽时间去看看墨水屏平板和电脑的，这两个是刚需。\r\n","htmlContent":"<h1>心情大好</h1>\n<p>Today is an epic day!</p>\n<p>今天是跑9KM的日子，虽然这个活动在我心中并不重要，但为了今天的比赛我做了很长时间的准备，每天晚上跑一个9KM，还是希望看到自己努力的成果的。</p>\n<p>没想到的是今天下雨了，考虑了一下还是决定参加了。</p>\n<p>到跑场之后遇到了很多我们班的同学。</p>\n<p>我本来打算把号码牌装到兜子里，可是现场却说要把号码牌挂到胸前，事实证明这是一个正确的抉择，因为后来搜照片需要用号码牌搜。</p>\n<p>为了装手机，我买了一个跑步腰包，昨天下午刚好回来，也是很极限了。今天我把号码牌别到了腰包上，它发挥了很大的作用。</p>\n<p><a href=\"../resources%5C260606%5CIMG_20260606_084819.jpg\">现场氛围在主持人的带动下很燃</a>，但我不是很理解为什么跑9KM还要热身？</p>\n<p>这个比赛规模还是可以的，活动也有模有样的。</p>\n<p><a href=\"../resources%5C260606%5Cmmexport1780732012207.jpg\">大球球</a></p>\n<p>没想到副校长也到场了。</p>\n<p>本来打算穿着冲锋衣跑，可是到那边之后感觉温度还可以，大家也都只穿着半袖，于是我也便把冲锋衣脱了，存包的地方人太多了，我就把包随手放到了一边，没想到之后包竟然湿了，看来这个包的防水性能也不是太强。之后还得注意。</p>\n<p><a href=\"../resources%5C260606%5CIMG_20260606_085349.jpg\">发枪前</a></p>\n<p>起跑之后大家都冲得很猛。开跑之后还遇到了李广昱，和他打了个招呼，然后就把他超了。我依旧选择了跟人的策略。一开始跟着一位4分30左右的看起来很专业的大姐，但跑了一会儿感觉有点慢了，于是我就发挥我越野跑优势，用人行道过弯把她超了。然后又跟了一位看起来也很专业的双马尾小姐姐，她身上香香的😋。</p>\n<p>这时正是雨下的最大的时候，我连眼睛都睁不开，戴的眼镜完全起不到任何作用，这时我的鞋也湿透了，开始的时候还刻意躲一躲水坑，但后来反正鞋也湿透了，干脆也不管了，有水坑也直接往过踩。</p>\n<p>又跑了一会儿之后我觉得这位小姐姐也有点慢了，于是我又<a href=\"../resources%5C260606%5Cmmexport6f1bc9c8ce3412f4307c6144265ae9aa_1780716766313.jpg\">跟上了一位大叔</a>，大概4分10秒左右，等到还剩大约一千多米的时候我再次发挥越野跑优势把他超了，之后继续以这个速度一直跑到终点。</p>\n<p><a href=\"../resources%5C260606%5Cmmexporte8ff59c8cbfca7079ed808a7df31ad1b_1780716780062.jpg\">跑步照片1</a> <a href=\"../resources%5C260606%5Cmmexport13d6c12065b0c5d3a9dbfc8ee790f6d0_1780716759037.jpg\">跑步照片2</a></p>\n<p>跑完之后其实不是很累，发了一个北京一号的奖牌和一瓶水，一盒饼干。奖牌上可以刻字，但人太多了，我没排队，直接回宿舍了。</p>\n<p>没想到的是室友竟然还都没起。</p>\n<p>回到宿舍之后朋友圈逐渐活跃了起来。不出意外我跑的最快。在找我的照片的时候偶然看到了尚彦睿的照片，就顺手给他发过去了。还和他聊了几句，我还<a href=\"../resources%5C260606%5CScreenshot_2026_0606_154711.jpg\">约了他跑步</a>。</p>\n<p>之后各个平台的成绩就都出来了，名次凑合吧，其实比我想象的低一些，但配速却远超我的想象。果然还是大家一起跑更有动力啊。</p>\n<p><a href=\"../resources%5C260606%5C927d4cc5.jpg\">1</a> <a 试之后我问了一下AI有关考无人机驾照的事，它们都说建议去考，而且优惠力度确实很大，可以说这次机会难得，错过了就基本没时间和钱继续搞这个了。所以我决定还是考一下小型超视距无人机的驾驶证。我选择了较早的时间段，这样万一考试没过还有时间再练一练然后补考。但是这段时间刚好和我去杭州铺设碳纤维的时间重合了，考虑了一下，还是打算放弃杭州校园之旅了，毕竟之后还要在那边待一年，不着急。\n\n今天中午吃饭的时候碰见田昀涛了，我们讨论了一些关于考无人机驾照的事，然后就开始讨论最近做的往年题，感觉自己确实还是有很多知识漏洞的，而他掌握的也没我想象得那么差，还是有一些实力的。\n\n今天下午在图书馆做题之余突然得知了豆包新推出的办公模式的本质是一个Linux虚拟机，这就有的玩了呀。于是我便让它给我写了个个人博客，我打算部署到之前给实践队创建的github账号上。我让豆包写好后它给了我一个网页接口，让我手动登录，非常方便智能，令我有点震撼。接着，我就看他把文件推送到github上。期间因为网络问题失败了几次，于是我就先去吃饭了。\n\n出图书馆去吃饭的路上看到很多人在拍天空，我抬头一看发现[天上的云一团一团](../resources/260622/IMG20260622181718.jpg)的，非常有趣，但是我只带了平板，没有带手机，没打算拍，但走了两步之后觉得这个确实比较有趣，于是便用平板拍了一张，没想到拍的还不错。\n\n在饭大厨那里打饭的时候突然有个人拍我的肩膀，扭头一看是李泊乐，这个让我有点意外，但非常开心。下次遇到他也要打个招呼。\n\n然后就看豆包进行神操作，它打开了我的github仓库，写入了它写好的网页，然后提交了上去，又打开仓库设置，成功部署了网页，并把[网址](https://jlchnjqx.github.io/blog/)回传给了我。我打开一看，还真有模有样的。这令我大为震撼，在食堂大呼我操。这简直就是部署了智能体的免费服务器，简直香爆了！\n\n回图书馆的路上沙河的妖风刮得很猛，体验到了家乡的风速。\n\n之后，我又让它用vue框架重构整个项目，它还真就给构出来了。但在提交到github上是却出现了各种问题，还把原来的网页删了。于是我便让它把前端项目发给我，然后我又把远程仓库glone到本地进行了代码回滚，然后又推送了上去，现在网页完全可以正常显示。\n\n虽然今天没做多少卷，但还是感觉非常开心。\n","htmlContent":"<h1>心情振奋</h1>\n<p>昨天晚上我做了两套六级的阅读题，打算为明天的英语阅读考试找一下手感，感觉做的还是很好的，文章都能读懂，而且正确率也很高。只是第一篇选词填空不认识的单词太多了，基本没法做。</p>\n<p>早上起床之后发现班主任在群里发了有关报考无人机驾照的通知，但当时没有太多时间思考，就先放过去了，打算等考完英语在考虑。</p>\n<p>今天上午的时候考了英语阅读，我提前15分钟就答完了，而且感觉答的很顺畅，除了第一篇完形有几个空不确定之外剩下的阅读题我感觉都很简单，而尚彦睿和田昀涛却卡点才答完，看来我的英语阅读水平还是有一些了，至少比山西同学强一些。</p>\n<p>考完试之后我问了一下AI有关考无人机驾照的事，它们都说建议去考，而且优惠力度确实很大，可以说这次机会难得，错过了就基本没时间和钱继续搞这个了。所以我决定还是考一下小型超视距无人机的驾驶证。我选择了较早的时间段，这样万一考试没过还有时间再练一练然后补考。但是这段时间刚好和我去杭州铺设碳纤维的时间重合了，考虑了一下，还是打算放弃杭州校园之旅了，毕竟之后还要在那边待一年，不着急。</p>\n<p>今天中午吃饭的时候碰见田昀涛了，我们讨论了一些关于考无人机驾照的事，然后就开始讨论最近做的往年题，感觉自己确实还是有很多知识漏洞的，而他掌握的也没我想象得那么差，还是有一些实力的。</p>\n<p>今天下午在图书馆做题之余突然得知了豆包新推出的办公模式的本质是一个Linux虚拟机，这就有的玩了呀。于是我便让它给我写了个个人博客，我打算部署到之前给实践队创建的github账号上。我让豆包写好后它给了我一个网页接口，让我手动登录，非常方便智能，令我有点震撼。接着，我就看他把文件推送到github上。期间因为网络问题失败了几次，于是我就先去吃饭了。</p>\n<p>出图书馆去吃饭的路上看到很多人在拍天空，我抬头一看发现<a href=\"../resources/260622/IMG20260622181718.jpg\">天上的云一团一团</a>的，非常有趣，但是我只带了平板，没有带手机，没打算拍，但走了两步之后觉得这个确实比较有趣，于是便用平板拍了一张，没想到拍的还不错。</p>\n<p>在饭大厨那里打饭的时候突然有个人拍我     let currentYear = new Date().getFullYear();

    function initYearSelector() {
      const yearSelect = document.getElementById('year-select');
      const monthSelect = document.getElementById('month-select');

      const today = new Date();
      const years = [...new Set(diaries.map(d => d.year))];
      years.sort();

      let minYear = today.getFullYear() - 5;
      let maxYear = today.getFullYear() + 5;

      if (years.length > 0) {
        minYear = Math.min(minYear, Math.min(...years) - 1);
        maxYear = Math.max(maxYear, Math.max(...years) + 1);
      }

      for (let year = minYear; year <= maxYear; year++) {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year + '年';
        yearSelect.appendChild(option);
      }

      const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      months.forEach((month, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = month;
        monthSelect.appendChild(option);
      });

      yearSelect.value = currentYear;
      monthSelect.value = currentMonth;

      yearSelect.addEventListener('change', (e) => {
        currentYear = parseInt(e.target.value);
        renderCalendar();
      });

      monthSelect.addEventListener('change', (e) => {
        currentMonth = parseInt(e.target.value);
        renderCalendar();
      });
    }

    function initTabs() {
      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
        });
      });
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
      dayNames.forEach(name => {
        const cell = document.createElement('div');
        cell.className = 'day-name';
        cell.textContent = name;
        grid.appendChild(cell);
      });

      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const startDay = firstDay.getDay();
      const totalDays = lastDay.getDate();

      const prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();
      for (let i = startDay - 1; i >= 0; i--) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.textContent = prevMonthLastDay - i;
        grid.appendChild(cell);
      }

      for (let day = 1; day <= totalDays; day++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        const dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        const diary = diaries.find(d => d.dateStr === dateStr);

        const dayNumber = document.createElement('span');
        dayNumber.className = 'day-number';
        dayNumber.textContent = day;
        cell.appendChild(dayNumber);

        if (diary) {
          cell.classList.add('has-diary');
          const circleSize = Math.min(6 + diary.wordCount / 20, 40);
          cell.style.setProperty('--circle-size', circleSize + 'px');

          const preview = document.createElement('div');
          preview.className = 'day-preview';
          preview.textContent = diary.preview;
          cell.appendChild(preview);

          const wordCount = document.createElement('div');
          wordCount.className = 'day-wordcount';
          wordCount.textContent = diary.wordCount + '字';
          cell.appendChild(wordCount);
        }

        cell.addEventListener('click', () => {
          document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
          cell.classList.add('selected');
          if (diary) {
            showDiaryDetail(dateStr);
          } else {
            const detailBody = document.getElementById('diary-detail-body');
            detailBody.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>这一天没有日记</p></div>';
          }
        });

        grid.appendChild(cell);
      }

      const remainingCells = 42 - (startDay + totalDays);
      for (let i = 1; i <= remainingCells; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell other-month';
        cell.textContent = i;
        grid.appendChild(cell);
      }

      document.getElementById('current-month').textContent = currentYear + '年' + (currentMonth + 1) + '月';

      const yearSelect = document.getElementById('year-select');
      const monthSelect = document.getElementById('month-select');
      if (yearSelect && monthSelect) {
        yearSelect.value = currentYear;
        monthSelect.value = currentMonth;
      }
    }

    function showDiaryDetail(dateStr) {
      const diary = diaries.find(d => d.dateStr === dateStr);
      if (diary) {
        const detailBody = document.getElementById('diary-detail-body');
        detailBody.innerHTML = '<div class="detail-date">' + diary.dateStr + '</div><div class="detail-words">共 ' + diary.wordCount + ' 字</div><div class="detail-content">' + diary.htmlContent + '</div>';
      }
    }

    function openDiary(dateStr) {
      showDiaryDetail(dateStr);
    }

    function initSearch() {
      const input = document.getElementById('search-input');
      const results = document.getElementById('search-results');

      input.addEventListener('input', () => {
        const query = input.value.toLowerCase();
        if (!query) {
          results.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>输入关键词搜索日记</p></div>';
          return;
        }

        const filtered = diaries.filter(d => d.content.toLowerCase().includes(query) || d.dateStr.includes(query));

        if (filtered.length === 0) {
          results.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>没有找到匹配的日记</p></div>';
        } else {
          results.innerHTML = filtered.map(d => '<div class="search-card" onclick="openDiary(\'' + d.dateStr + '\')"><div class="search-date">' + d.dateStr + '</div><div class="search-preview">' + d.preview + '</div><div class="preview-words" style="margin-top: 0.5rem;">' + d.wordCount + ' 字</div></div>').join('');
        }
      });
    }

    function initStats() {
      const totalCount = Object.values(stats.byDate).length;
      const totalWords = Object.values(stats.byDate).reduce((sum, d) => sum + d.words, 0);

      document.getElementById('total-count').textContent = totalCount;
      document.getElementById('total-words').textContent = totalWords.toLocaleString();
      document.getElementById('active-days').textContent = totalCount;
      document.getElementById('avg-words').textContent = totalCount > 0 ? Math.round(totalWords / totalCount) : 0;

      const monthLabels = Object.keys(stats.byMonth).sort();
      const monthCounts = monthLabels.map(m => stats.byMonth[m].count);
      const monthWords = monthLabels.map(m => stats.byMonth[m].words);

      new Chart(document.getElementById('monthly-chart'), {
        type: 'bar',
        data: {
          labels: monthLabels,
          datasets: [
            {
              label: '日记数量',
              data: monthCounts,
              backgroundColor: 'rgba(155, 89, 182, 0.6)',
              borderColor: 'rgba(155, 89, 182, 1)',
              borderWidth: 1,
              borderRadius: 8
            },
            {
              label: '字数',
              data: monthWords,
              backgroundColor: 'rgba(139, 92, 246, 0.4)',
              borderColor: 'rgba(139, 92, 246, 1)',
              borderWidth: 1,
              borderRadius: 8,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          onClick: (event, elements) => {
            if (elements.length > 0) {
              const index = elements[0].index;
              const month = monthLabels[index];
              const monthDiaries = diaries.filter(d => d.dateStr.startsWith(month));
              if (monthDiaries.length > 0) {
                openDiary(monthDiaries[0].dateStr);
              }
            }
          },
          plugins: {
            legend: {
              labels: { color: '#e0e0e0' }
            }
          },
          scales: {
            x: {
              ticks: { color: '#888' },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            y: {
              ticks: { color: '#888' },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            y1: {
              position: 'right',
              ticks: { color: '#888' },
              grid: { display: false }
            }
          }
        }
      });

      const weekLabels = Object.keys(stats.byWeek).sort();
      const weekCounts = weekLabels.map(w => stats.byWeek[w].count);
      const weekWords = weekLabels.map(w => stats.byWeek[w].words);

      new Chart(document.getElementById('weekly-chart'), {
        type: 'bar',
        data: {
          labels: weekLabels,
          datasets: [
            {
              label: '日记数量',
              data: weekCounts,
              backgroundColor: 'rgba(155, 89, 182, 0.6)',
              borderColor: 'rgba(155, 89, 182, 1)',
              borderWidth: 1,
              borderRadius: 8
            },
            {
              label: '字数',
              data: weekWords,
              backgroundColor: 'rgba(139, 92, 246, 0.4)',
              borderColor: 'rgba(139, 92, 246, 1)',
              borderWidth: 1,
              borderRadius: 8,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          onClick: (event, elements) => {
            if (elements.length > 0) {
              const index = elements[0].index;
              const week = weekLabels[index];
              const year = week.split('-')[0];
              const weekNum = parseInt(week.split('W')[1]);
              const startDate = new Date(year, 0, 1 + (weekNum - 1) * 7);
              const endDate = new Date(year, 0, 1 + weekNum * 7);
              const weekDiaries = diaries.filter(d => {
                const dDate = new Date(d.dateStr);
                return dDate >= startDate && dDate < endDate;
              });
              if (weekDiaries.length > 0) {
                openDiary(weekDiaries[0].dateStr);
              }
            }
          },
          plugins: {
            legend: {
              labels: { color: '#e0e0e0' }
            }
          },
          scales: {
            x: {
              ticks: { color: '#888', maxRotation: 45, minRotation: 45 },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            y: {
              ticks: { color: '#888' },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            y1: {
              position: 'right',
              ticks: { color: '#888' },
              grid: { display: false }
            }
          }
        }
      });

      const yearLabels = Object.keys(stats.byYear).sort();
      const yearCounts = yearLabels.map(y => stats.byYear[y].count);
      const yearWords = yearLabels.map(y => stats.byYear[y].words);

      new Chart(document.getElementById('yearly-chart'), {
        type: 'line',
        data: {
          labels: yearLabels,
          datasets: [
            {
              label: '日记数量',
              data: yearCounts,
              borderColor: 'rgba(155, 89, 182, 1)',
              backgroundColor: 'rgba(155, 89, 182, 0.2)',
              tension: 0.4,
              fill: true
            },
            {
              label: '字数',
              data: yearWords,
              borderColor: 'rgba(139, 92, 246, 1)',
              backgroundColor: 'rgba(139, 92, 246, 0.2)',
              tension: 0.4,
              fill: true,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          onClick: (event, elements) => {
            if (elements.length > 0) {
              const index = elements[0].index;
              const year = yearLabels[index];
              const yearDiaries = diaries.filter(d => d.dateStr.startsWith(year));
              if (yearDiaries.length > 0) {
                openDiary(yearDiaries[0].dateStr);
              }
            }
          },
          plugins: {
            legend: {
              labels: { color: '#e0e0e0' }
            }
          },
          scales: {
            x: {
              ticks: { color: '#888' },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            y: {
              ticks: { color: '#888' },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            y1: {
              position: 'right',
              ticks: { color: '#888' },
              grid: { display: false }
            }
          }
        }
      });

      const dateLabels = diaries.map(d => d.dateStr);
      const dateWords = diaries.map(d => d.wordCount);

      new Chart(document.getElementById('daily-chart'), {
        type: 'line',
        data: {
          labels: dateLabels,
          datasets: [{
            label: '字数',
            data: dateWords,
            borderColor: 'rgba(155, 89, 182, 1)',
            backgroundColor: 'rgba(155, 89, 182, 0.1)',
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          onClick: (event, elements) => {
            if (elements.length > 0) {
              const index = elements[0].index;
              const dateStr = dateLabels[index];
              openDiary(dateStr);
            }
          },
          plugins: {
            legend: {
              labels: { color: '#e0e0e0' }
            }
          },
          scales: {
            x: {
              ticks: { color: '#888', maxRotation: 45, minRotation: 45 },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            y: {
              ticks: { color: '#888' },
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            }
          }
        }
      });
    }

    document.getElementById('prev-month').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    });

    document.getElementById('next-month').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    });

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('diary-modal').classList.remove('active');
    });

    document.getElementById('diary-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('diary-modal')) {
        document.getElementById('diary-modal').classList.remove('active');
      }
    });

    initTabs();
    initYearSelector();
    renderCalendar();
    initSearch();
    initStats();
  </script>
</body>
</html>
